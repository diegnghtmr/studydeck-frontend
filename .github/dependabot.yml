version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router*"
      tanstack:
        patterns:
          - "@tanstack/*"
      dev-tooling:
        patterns:
          - "vite"
          - "vitest"
          - "@vitejs/*"
          - "eslint*"
          - "@playwright/*"
          - "typescript"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
