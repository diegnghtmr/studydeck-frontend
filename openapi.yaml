openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: StudyDeck AI API
  version: 1.0.0
  summary: API versionada para una plataforma de estudio tipo Anki con IA, RAG, MCP y observabilidad.
  description: |
    OpenAPI 3.1 para StudyDeck AI.
    Diseño orientado a monolito modular hexagonal en Java 25 + Spring Boot 4.x + Spring AI 2.x.
    Defaults asumidos:
      - API versionada en /v1
      - paginación por offset: page=0, size=20, maxSize=100
      - sorting por createdAt asc salvo endpoints de revisión
      - autenticación principal: OAuth2/OIDC + JWT; API keys con scopes para automatización cuando aplique
      - roles y scopes descritos en securitySchemes y descripciones de operación
servers:
  - url: http://localhost:8080
    description: Backend local en Docker Compose
  - url: http://localhost:8080/actuator
    description: Actuator local en Docker Compose
  - url: https://api.studydeck.ai
    description: Producción
tags:
  - name: Auth
  - name: Users
  - name: Decks
  - name: NoteTypes
  - name: Notes
  - name: Cards
  - name: Reviews
  - name: AI
  - name: Documents
  - name: RAG
  - name: ImportExport
  - name: MCP
  - name: Skills
  - name: Admin
  - name: Observability
security:
  - oauth2:
      - study.read

paths:
  /v1/auth/me:
    get:
      tags: [Auth]
      summary: Obtener principal autenticado
      operationId: getCurrentPrincipal
      security:
        - oauth2: [study.read]
      responses:
        "200":
          description: Principal autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthPrincipal"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/security/csrf-token:
    get:
      tags: [Auth]
      summary: Obtener token CSRF si se opera en modo cookie/session
      operationId: getCsrfToken
      security:
        - oauth2: [study.read]
      responses:
        "200":
          description: Token CSRF
          content:
            application/json:
              schema:
                type: object
                required: [token, headerName]
                properties:
                  token:
                    type: string
                  headerName:
                    type: string
                    default: X-CSRF-TOKEN

  /v1/users:
    get:
      tags: [Users]
      summary: Listar usuarios
      operationId: listUsers
      security:
        - oauth2: [admin.read]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - $ref: "#/components/parameters/Sort"
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Página de usuarios
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedUsers"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Users]
      summary: Crear usuario administrativo o de servicio
      operationId: createUser
      security:
        - oauth2: [admin.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
      responses:
        "201":
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/users/{userId}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: [Users]
      summary: Obtener usuario por id
      operationId: getUser
      security:
        - oauth2: [admin.read]
      responses:
        "200":
          description: Usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Users]
      summary: Actualizar usuario
      operationId: patchUser
      security:
        - oauth2: [admin.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPatchRequest"
      responses:
        "200":
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      tags: [Users]
      summary: Desactivar usuario
      operationId: deactivateUser
      security:
        - oauth2: [admin.write]
      responses:
        "204":
          description: Usuario desactivado

  /v1/note-types:
    get:
      tags: [NoteTypes]
      summary: Listar tipos de nota/tarjeta soportados
      operationId: listNoteTypes
      security:
        - oauth2: [study.read]
      responses:
        "200":
          description: Tipos soportados
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/NoteTypeDescriptor"

  /v1/decks:
    get:
      tags: [Decks]
      summary: Listar mazos
      operationId: listDecks
      security:
        - oauth2: [study.read]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - $ref: "#/components/parameters/Sort"
        - in: query
          name: archived
          schema:
            type: boolean
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Página de mazos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedDecks"
    post:
      tags: [Decks]
      summary: Crear mazo
      operationId: createDeck
      security:
        - oauth2: [study.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeckCreateRequest"
      responses:
        "201":
          description: Mazo creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deck"

  /v1/decks/{deckId}:
    parameters:
      - $ref: "#/components/parameters/DeckId"
    get:
      tags: [Decks]
      summary: Obtener mazo
      operationId: getDeck
      security:
        - oauth2: [study.read]
      responses:
        "200":
          description: Mazo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deck"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Decks]
      summary: Actualizar mazo
      operationId: patchDeck
      security:
        - oauth2: [study.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeckPatchRequest"
      responses:
        "200":
          description: Mazo actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deck"
    delete:
      tags: [Decks]
      summary: Archivar o eliminar mazo
      operationId: deleteDeck
      security:
        - oauth2: [study.write]
      parameters:
        - in: query
          name: hardDelete
          schema:
            type: boolean
            default: false
      responses:
        "204":
          description: Mazo archivado o eliminado

  /v1/decks/{deckId}/stats:
    parameters:
      - $ref: "#/components/parameters/DeckId"
    get:
      tags: [Decks]
      summary: Obtener estadísticas de mazo
      operationId: getDeckStats
      security:
        - oauth2: [study.read]
      responses:
        "200":
          description: Estadísticas del mazo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeckStats"

  /v1/notes:
    get:
      tags: [Notes]
      summary: Listar notas
      operationId: listNotes
      security:
        - oauth2: [study.read]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - $ref: "#/components/parameters/Sort"
        - in: query
          name: deckId
          schema:
            type: string
            format: uuid
        - in: query
          name: noteType
          schema:
            $ref: "#/components/schemas/NoteType"
        - in: query
          name: tag
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Página de notas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedNotes"
    post:
      tags: [Notes]
      summary: Crear nota
      operationId: createNote
      security:
        - oauth2: [study.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteCreateRequest"
      responses:
        "201":
          description: Nota creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /v1/notes/{noteId}:
    parameters:
      - $ref: "#/components/parameters/NoteId"
    get:
      tags: [Notes]
      summary: Obtener nota
      operationId: getNote
      security:
        - oauth2: [study.read]
      responses:
        "200":
          description: Nota
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Notes]
      summary: Actualizar nota
      operationId: patchNote
      security:
        - oauth2: [study.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotePatchRequest"
      responses:
        "200":
          description: Nota actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
    delete:
      tags: [Notes]
      summary: Eliminar nota y sus tarjetas derivadas
      operationId: deleteNote
      security:
        - oauth2: [study.write]
      responses:
        "204":
          description: Nota eliminada

  /v1/notes/{noteId}/cards:
    parameters:
      - $ref: "#/components/parameters/NoteId"
    get:
      tags: [Notes, Cards]
      summary: Listar tarjetas derivadas de una nota
      operationId: listCardsByNote
      security:
        - oauth2: [study.read]
      responses:
        "200":
          description: Tarjetas de la nota
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Card"

  /v1/cards:
    get:
      tags: [Cards]
      summary: Listar tarjetas
      operationId: listCards
      security:
        - oauth2: [study.read]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - $ref: "#/components/parameters/Sort"
        - in: query
          name: deckId
          schema:
            type: string
            format: uuid
        - in: query
          name: dueBefore
          schema:
            type: string
            format: date-time
        - in: query
          name: suspended
          schema:
            type: boolean
      responses:
        "200":
          description: Página de tarjetas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedCards"

  /v1/cards/due:
    get:
      tags: [Cards, Reviews]
      summary: Obtener tarjetas debidas
      operationId: getDueCards
      security:
        - oauth2: [study.read]
      parameters:
        - in: query
          name: deckId
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        "200":
          description: Tarjetas debidas
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Card"

  /v1/cards/{cardId}:
    parameters:
      - $ref: "#/components/parameters/CardId"
    get:
      tags: [Cards]
      summary: Obtener tarjeta
      operationId: getCard
      security:
        - oauth2: [study.read]
      responses:
        "200":
          description: Tarjeta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
    patch:
      tags: [Cards]
      summary: Actualizar estado o metadatos de tarjeta
      operationId: patchCard
      security:
        - oauth2: [study.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardPatchRequest"
      responses:
        "200":
          description: Tarjeta actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
    delete:
      tags: [Cards]
      summary: Eliminar tarjeta
      operationId: deleteCard
      security:
        - oauth2: [study.write]
      responses:
        "204":
          description: Tarjeta eliminada

  /v1/cards/{cardId}/preview:
    parameters:
      - $ref: "#/components/parameters/CardId"
    get:
      tags: [Cards]
      summary: Previsualizar render de tarjeta
      operationId: previewCard
      security:
        - oauth2: [study.read]
      responses:
        "200":
          description: Preview de tarjeta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardPreview"

  /v1/review-sessions:
    get:
      tags: [Reviews]
      summary: Listar sesiones de revisión
      operationId: listReviewSessions
      security:
        - oauth2: [study.read]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Sesiones
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedReviewSessions"
    post:
      tags: [Reviews]
      summary: Iniciar sesión de revisión
      operationId: createReviewSession
      security:
        - oauth2: [review.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewSessionCreateRequest"
      responses:
        "201":
          description: Sesión iniciada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewSession"

  /v1/review-sessions/{sessionId}:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      tags: [Reviews]
      summary: Obtener sesión de revisión
      operationId: getReviewSession
      security:
        - oauth2: [study.read]
      responses:
        "200":
          description: Sesión
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewSession"

  /v1/review-sessions/{sessionId}/next:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      tags: [Reviews]
      summary: Obtener siguiente tarjeta a presentar
      operationId: getNextReviewCard
      security:
        - oauth2: [review.write]
      responses:
        "200":
          description: Siguiente tarjeta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextReviewCard"
        "204":
          description: No hay más tarjetas para la sesión

  /v1/reviews:
    post:
      tags: [Reviews]
      summary: Registrar respuesta de revisión y calcular siguiente scheduling
      operationId: submitReview
      security:
        - oauth2: [review.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewSubmitRequest"
      responses:
        "200":
          description: Resultado de FSRS/SM-2 normalizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FSRSReviewResult"
              examples:
                fsrsResult:
                  value:
                    cardId: "4b2b0e1a-83cb-4202-9fa7-5da983e4c3a2"
                    sessionId: "bb08b37b-25c0-4497-89ca-4ad03b2e718f"
                    rating: "good"
                    reviewedAt: "2026-06-19T15:31:00Z"
                    previousState:
                      dueAt: "2026-06-19T00:00:00Z"
                      stability: 4.92
                      difficulty: 5.61
                      retrievability: 0.89
                      elapsedDays: 5
                      scheduledDays: 5
                    nextState:
                      dueAt: "2026-06-27T00:00:00Z"
                      stability: 8.32
                      difficulty: 5.44
                      desiredRetention: 0.9
                      scheduledDays: 8
                    historyEntryId: "0e6c91e4-fbc4-430a-95d4-4b14ffce7a1d"

  /v1/reviews/history:
    get:
      tags: [Reviews]
      summary: Consultar historial de revisiones
      operationId: listReviewHistory
      security:
        - oauth2: [study.read]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - in: query
          name: deckId
          schema:
            type: string
            format: uuid
        - in: query
          name: cardId
          schema:
            type: string
            format: uuid
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Historial paginado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedReviewLogs"

  /v1/ai/generate-flashcards:
    post:
      tags: [AI]
      summary: Generar tarjetas con IA usando salida estructurada
      operationId: generateFlashcards
      security:
        - oauth2: [ai.generate]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateFlashcardsRequest"
      responses:
        "200":
          description: Resultado estructurado de generación
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateFlashcardsResponse"

  /v1/ai/improve-flashcard:
    post:
      tags: [AI]
      summary: Mejorar una flashcard existente o propuesta
      operationId: improveFlashcard
      security:
        - oauth2: [ai.generate]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImproveFlashcardRequest"
      responses:
        "200":
          description: Flashcard mejorada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImproveFlashcardResponse"

  /v1/documents:
    get:
      tags: [Documents]
      summary: Listar documentos
      operationId: listDocuments
      security:
        - oauth2: [documents.read]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - in: query
          name: ingestStatus
          schema:
            $ref: "#/components/schemas/IngestStatus"
      responses:
        "200":
          description: Página de documentos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedDocuments"
    post:
      tags: [Documents]
      summary: Registrar documento o texto base para RAG
      operationId: createDocument
      security:
        - oauth2: [documents.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentCreateRequest"
      responses:
        "201":
          description: Documento creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /v1/documents/{documentId}:
    parameters:
      - $ref: "#/components/parameters/DocumentId"
    get:
      tags: [Documents]
      summary: Obtener documento
      operationId: getDocument
      security:
        - oauth2: [documents.read]
      responses:
        "200":
          description: Documento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      tags: [Documents]
      summary: Eliminar documento
      operationId: deleteDocument
      security:
        - oauth2: [documents.write]
      responses:
        "204":
          description: Documento eliminado

  /v1/documents/{documentId}/ingest:
    parameters:
      - $ref: "#/components/parameters/DocumentId"
    post:
      tags: [Documents, RAG]
      summary: Ingerir documento en pipeline RAG
      operationId: ingestDocument
      security:
        - oauth2: [documents.write]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RagIngestRequest"
            examples:
              ingestRequest:
                value:
                  chunking:
                    strategy: "token"
                    targetSize: 400
                    overlap: 40
                  embeddingProvider: "openai:text-embedding-3-large"
                  metadata:
                    course: "biologia"
                    source: "apuntes-clase-1"
      responses:
        "202":
          description: Ingesta aceptada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestJob"

  /v1/documents/{documentId}/chunks:
    parameters:
      - $ref: "#/components/parameters/DocumentId"
    get:
      tags: [Documents]
      summary: Listar chunks derivados de un documento
      operationId: listDocumentChunks
      security:
        - oauth2: [documents.read]
      responses:
        "200":
          description: Chunks del documento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedChunks"

  /v1/chunks:
    get:
      tags: [Documents]
      summary: Buscar chunks
      operationId: listChunks
      security:
        - oauth2: [documents.read]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
        - in: query
          name: documentId
          schema:
            type: string
            format: uuid
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Página de chunks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedChunks"

  /v1/embeddings:
    get:
      tags: [Documents]
      summary: Consultar metadata de embeddings
      operationId: listEmbeddings
      security:
        - oauth2: [documents.read]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: Embeddings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedEmbeddingMeta"

  /v1/rag/search:
    post:
      tags: [RAG]
      summary: Búsqueda semántica sobre documentos del usuario
      operationId: ragSearch
      security:
        - oauth2: [rag.query]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RagSearchRequest"
      responses:
        "200":
          description: Resultado de búsqueda semántica
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagSearchResponse"

  /v1/rag/chat:
    post:
      tags: [RAG]
      summary: Chat contextual con RAG
      operationId: ragChat
      security:
        - oauth2: [rag.query]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RagChatRequest"
      responses:
        "200":
          description: Respuesta del chat con fuentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagChatResponse"

  "/v1/imports/flashcards:validate":
    post:
      tags: [ImportExport]
      summary: Validar payload JSON de importación sin persistir
      operationId: validateFlashcardImport
      security:
        - oauth2: [import.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlashcardImportV1"
      responses:
        "200":
