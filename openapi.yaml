components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: |
        OAuth2/OIDC para JWT bearer tokens.
        Vite/React SPA: authorizationCode + PKCE contra el IdP.
        Service-to-service y automatización MCP: clientCredentials con scopes del IdP.
        CLI interactivo: Device Authorization Grant documentado en el IdP.
        API keys son una alternativa machine-readable separada para automatización/MCP cuando no hay identidad de usuario final.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.studydeck.ai/oauth2/authorize
          tokenUrl: https://auth.studydeck.ai/oauth2/token
          refreshUrl: https://auth.studydeck.ai/oauth2/token
          scopes:
            openid: Identidad OIDC
            profile: Perfil del usuario
            email: Email del usuario
            study.read: Lectura de estudio
            study.write: Escritura de estudio
            review.write: Revisión
            documents.read: Lectura de documentos
            documents.write: Escritura de documentos
            rag.query: Consultas RAG
            ai.generate: Generación IA
            import.write: Importación JSON
            export.read: Exportación
            mcp.invoke: Invocar MCP
            admin.read: Lectura administrativa
            admin.write: Escritura administrativa
            audit.read: Lectura de auditoría
            observability.read: Lectura de observabilidad
        clientCredentials:
          tokenUrl: https://auth.studydeck.ai/oauth2/token
          scopes:
            study.read: Lectura de estudio
            study.write: Escritura de estudio
            documents.read: Lectura de documentos
            documents.write: Escritura de documentos
            rag.query: Consultas RAG
            ai.generate: Generación IA
            import.write: Importación JSON
            export.read: Exportación
            mcp.invoke: Invocar MCP
            admin.read: Lectura administrativa
    openId:
      type: openIdConnect
      openIdConnectUrl: https://auth.studydeck.ai/.well-known/openid-configuration
    apiKey:
      type: apiKey
      in: header
      name: X-StudyDeck-API-Key
      description: |
        API key scoped for service clients, CI jobs and MCP automation.
        It must be hashed at rest, revocable, expiring, audited, and mapped server-side to least-privilege scopes.
        Browser clients must use OIDC Authorization Code + PKCE instead.

  parameters:
    Page:
      in: query
      name: page
      description: Índice de página basado en offset
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      in: query
      name: size
      description: Tamaño de página
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Sort:
      in: query
      name: sort
      description: Campo y dirección, por ejemplo createdAt,asc
      schema:
        type: string
        default: createdAt,asc
    UserId:
      in: path
      name: userId
      required: true
      schema:
        type: string
        format: uuid
    DeckId:
      in: path
      name: deckId
      required: true
      schema:
        type: string
        format: uuid
    NoteId:
      in: path
      name: noteId
      required: true
      schema:
        type: string
        format: uuid
    CardId:
      in: path
      name: cardId
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      in: path
      name: sessionId
      required: true
      schema:
        type: string
        format: uuid
    DocumentId:
      in: path
      name: documentId
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Request inválida
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: No autenticado
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: No autorizado
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: No encontrado
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Conflict:
      description: Conflicto
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    TooManyRequests:
      description: Rate limit excedido
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    UnprocessableEntity:
      description: Error semántico o validación de dominio
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

  schemas:
    Problem:
      type: object
      additionalProperties: true
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri-reference
          default: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        code:
          type: string
        requestId:
          type: string
        traceId:
          type: string
        violations:
          type: array
          items:
            $ref: "#/components/schemas/Violation"

    Violation:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string
        code:
          type: string

    PageMeta:
      type: object
      required: [page, size, totalElements, totalPages]
      properties:
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    AuditFields:
      type: object
      required: [createdAt, updatedAt]
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid
        updatedBy:
          type: string
          format: uuid

    Role:
      type: string
      enum:
        - ROLE_USER
        - ROLE_ADMIN
        - ROLE_SUPPORT
        - ROLE_SERVICE_MCP
        - ROLE_SERVICE_CLI

    NoteType:
      type: string
      enum:
        - basic
        - reversed
        - cloze
        - multiple-choice
        - free-text

    ReviewRating:
      type: string
      enum: [again, hard, good, easy]

    IngestStatus:
      type: string
      enum: [registered, pending, processing, completed, failed]

    AuthPrincipal:
      allOf:
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          required: [id, subject, email, roles, scopes]
          properties:
            id:
              type: string
              format: uuid
            subject:
              type: string
            email:
              type: string
              format: email
            displayName:
              type: string
            roles:
              type: array
              items:
                $ref: "#/components/schemas/Role"
            scopes:
              type: array
              items:
                type: string
            requestId:
              type: string
            traceId:
              type: string

    User:
      allOf:
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          required: [id, email, roles, active]
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              format: email
            displayName:
              type: string
            roles:
              type: array
              items:
                $ref: "#/components/schemas/Role"
            active:
              type: boolean
            externalSubject:
              type: string

    UserCreateRequest:
      type: object
      additionalProperties: false
      required: [email, roles]
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        roles:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/Role"

    UserPatchRequest:
      type: object
      additionalProperties: false
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        roles:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/Role"
        active:
          type: boolean

    PagedUsers:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/User"
        page:
          $ref: "#/components/schemas/PageMeta"

    Deck:
      allOf:
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          required: [id, title, archived]
          properties:
            id:
              type: string
              format: uuid
            title:
              type: string
              minLength: 1
              maxLength: 120
            description:
              type: string
              maxLength: 1000
            tags:
              type: array
              items:
                type: string
            archived:
              type: boolean
            defaultDesiredRetention:
              type: number
              minimum: 0.7
              maximum: 0.99
              default: 0.9

    DeckCreateRequest:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        tags:
          type: array
          maxItems: 50
          items:
            type: string
        defaultDesiredRetention:
          type: number
          minimum: 0.7
          maximum: 0.99
          default: 0.9

    DeckPatchRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        archived:
          type: boolean
        tags:
          type: array
          items:
            type: string
        defaultDesiredRetention:
          type: number
          minimum: 0.7
          maximum: 0.99

    DeckStats:
      type: object
      required:
        [
          deckId,
          totalNotes,
          totalCards,
          dueToday,
          newCards,
          reviewedToday,
          suspendedCards,
        ]
      properties:
        deckId:
          type: string
          format: uuid
        totalNotes:
          type: integer
        totalCards:
          type: integer
        dueToday:
          type: integer
        newCards:
          type: integer
          description: Cards in NEW state (or with no schedule row) in this deck.
        reviewedToday:
          type: integer
        suspendedCards:
          type: integer
        againRate7d:
          type: number
        averageRetention30d:
          type: number

    PagedDecks:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Deck"
        page:
          $ref: "#/components/schemas/PageMeta"

    NoteTypeDescriptor:
      type: object
      required: [name, label, fields]
      properties:
        name:
          $ref: "#/components/schemas/NoteType"
        label:
          type: string
        fields:
          type: array
          items:
            type: string
        guidance:
          type: string
        secondary:
          type: boolean

    SourceLink:
      type: object
      additionalProperties: false
      properties:
        sourceType:
          type: string
          enum: [manual, document, rag, ai-generated, import-json, mcp, cli]
        documentId:
          type: string
          format: uuid
        chunkIds:
          type: array
          items:
            type: string
            format: uuid
        reference:
          type: string

    BasicNoteContent:
      type: object
      additionalProperties: false
      required: [front, back]
      properties:
        front:
          type: string
          minLength: 1
          maxLength: 1000
        back:
          type: string
          minLength: 1
          maxLength: 5000

    ReversedNoteContent:
      type: object
      additionalProperties: false
      required: [front, back]
      properties:
        front:
          type: string
          minLength: 1
          maxLength: 1000
        back:
          type: string
          minLength: 1
          maxLength: 5000

    ClozeNoteContent:
      type: object
      additionalProperties: false
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 5000
          pattern: ".*\\{\\{c[0-9]+::.+\\}\\}.*"

    MultipleChoiceOption:
      type: object
      required: [key, text]
      properties:
        key:
          type: string
          pattern: "^[A-Z]$"
        text:
          type: string
          minLength: 1
          maxLength: 1000

    MultipleChoiceNoteContent:
      type: object
      additionalProperties: false
      required: [question, options, correctOptionKeys]
